name: Building Program
run-name: Building ${{ github.repository }}

on:
  workflow_dispatch:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches:
      - master

env:
  REPOSITORY: https://github.com/GXDE-OS/GXDE  
  BOTTLEPATH: system-bottle

jobs:
  call:
    uses: azzynovais/GXDE/.github/workflows/building-deb.yml@master
    secrets:
      PASSWD: ${{ secrets.PASSWD }}
      USERS: ${{ secrets.USERS }}
      HOST: ${{ secrets.HOST }}
      UPATH: ${{ secrets.UPATH }}
      UPROGRAM: ${{ secrets.UPROGRAM }}
      UPORT: ${{ secrets.UPORT }}
